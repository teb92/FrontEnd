<!DOCTYPE html>
<html>

<head>
    <link rel="stylesheet" href="styles/main.css" />
    <link rel="stylesheet" href="styles/catalog.css" />
    <link rel="stylesheet" href="styles/poster.css" />
</head>
<header>
    <div class="banner contain">
        <span><a>Login</a> or <a>Register</a> | TODAY'S DATE</span>
        <div>
            <span><a>Whishlist</a> | <a>Stores</a> | <a>My Account</a></span>
            <button class="banner-button">Language</button>
        </div>
    </div>
    </div>
    <nav class="navbar contain">
        <div class="nav-main">
            <button class="nav-brand">
                <img src="https://logodownload.org/wp-content/uploads/2020/04/puma-logo.png" alt="logo"
                    class="brand-image">
            </button>
            <button class="nav-button">Home</button>
            <button class="nav-button">Shop</button>
            <button class="nav-button">Pages</button>
            <button class="nav-button">Blog</button>
            <button class="nav-button">Shortcodes</button>
            <button class="nav-button">Buy Now</button>
        </div>
        <div>
            <button class="icon-button">
                <img src="https://cdn-icons-png.flaticon.com/512/622/622669.png" alt="search-icon" class="nav-icon">
            </button>
            <button class="icon-button">
                <img src="https://cdn-icons-png.flaticon.com/512/3144/3144456.png" alt="cart-icon" class="nav-icon">
            </button>
        </div>
    </nav>
</header>

<body>
    <section>
        <div class="poster contain">
            <div class="poster-content">
                <div>
                    <p class="sup-text">We represent</p>
                    <p class="main-text">San José Street Style</p>
                </div>
                <button class="shop-button">Shop now</button>
            </div>
            <div>
                <img src="https://i.ibb.co/YkM4Z4s/model.png" alt="model" class="poster-image">
            </div>
        </div>
    </section>

    <main class="catalog contain">
        <div>
            <div class="title-container">
                <p class="main-title">Trending</p>
                <p class="sub-title">Most Trendy Clothes</p>
            </div>
        </div>

        <div class="product-rows">
            <div class="product">
                <div>
                    <img src="https://m.media-amazon.com/images/I/61Oz8jfwjKL.jpg" alt="giant-ducky"
                        class="product-image">
                </div>
                <div class="product-info">
                    <div class="main-row">
                        <span class="info-name">Giant Ducky</span>
                        <button class="add-button">+</button>
                    </div>
                    <span>Duckies</span>
                    <span class="price">$475</span>
                </div>
            </div>

            <div class="product">
                <div>
                    <img src="https://i.ibb.co/vmJbgwp/3-duckies.png" alt="3-duckies" class="product-image">
                </div>
                <div class="product-info">
                    <div class="main-row">
                        <span class="info-name">3 Duckies</span>
                        <button class="add-button">+</button>
                    </div>
                    <span>Duckies</span>
                    <span class="price">$475</span>
                </div>
            </div>

            <div class="product">
                <div>
                    <img src="https://i.ibb.co/ZVJ6YwD/bat-ducky.jpg" alt="bat-ducky" class="product-image">
                </div>
                <div class="product-info">
                    <div class="main-row">
                        <span class="info-name">Bat Ducky</span>
                        <button class="add-button">+</button>
                    </div>
                    <span>Duckies</span>
                    <span class="price">$475</span>
                </div>
            </div>

            <div class="product">
                <div>
                    <img src="https://i.ibb.co/rcWcT8J/cool-ducky.jpg" alt="cool-ducky" class="product-image">
                </div>
                <div class="product-info">
                    <div class="main-row">
                        <span class="info-name">Cool Ducky</span>
                        <button class="add-button">+</button>
                    </div>
                    <span>Duckies</span>
                    <span class="price">$475</span>
                </div>
            </div>
        </div>
    </main>
</body>

</html>
